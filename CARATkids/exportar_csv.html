<!DOCTYPE html>
<html lang="pt">

<head>
    <meta charset="UTF-8">
    <title>Descarregar Dados CSV</title>
</head>

<body>
    <script>
        (async function () {
            try {
                // Carrega dinamicamente as dependências do Firebase (evita bloqueio de CORS de módulos locais em file:///)
                const { initializeApp } = await import("https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js");
                const { getFirestore, collection, getDocs, query, orderBy } = await import("https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js");

                // Credenciais do Firebase correspondentes a este projeto
                const firebaseConfig = {
                    apiKey: "SUBSTITUIR_API_KEY",
                    authDomain: "SUBSTITUIR_PAUTH_DOMAIN",
                    projectId: "SUBSTITUIR_PROJECT_ID",
                    storageBucket: "SUBSTITUIR_STORAGE_BUCKET",
                    messagingSenderId: "SUBSTITUIR_MESSAGING_SENDER_ID",
                    appId: "SUBSTITUIR_APP_ID"
                };

                const app = initializeApp(firebaseConfig);
                const db = getFirestore(app);

                try {
                    // Obter interações por ordem cronológica
                    const q = query(collection(db, "interactions"), orderBy("timestamp", "asc"));
                    const querySnapshot = await getDocs(q);

                    const data = [];
                    querySnapshot.forEach((doc) => {
                        data.push(doc.data());
                    });

                    if (data.length > 0) {
                        // Ordem absoluta das colunas
                        const ordemExata = [
                            "session_id", "page_title", "time_enter", "event_Type",
                            "timestamp", "click_x", "click_y", "eventInfo",
                            "eventValue", "elementType", "operative_system", "browser"
                        ];

                        // Criar o cabeçalho do CSV (usar ; em vez de , para o Excel em PT não meter tudo numa coluna)
                        let csvContent = ordemExata.join(";") + "\n";

                        // Preencher com as linhas
                        data.forEach(row => {
                            let rowValues = ordemExata.map(key => {
                                let value = row[key] !== undefined ? row[key] : "";
                                // Tratar strings para evitar que as vírgulas dentro do texto quebrem a formatação
                                value = String(value).replace(/"/g, '""'); // escapa aspas
                                return `"${value}"`;
                            });
                            csvContent += rowValues.join(";") + "\n";
                        });

                        // Forçar o encoding UTF-8 (útil para o Excel conseguir ler acentos de PT-PT)
                        const blob = new Blob(["\uFEFF" + csvContent], { type: "text/csv;charset=utf-8;" });
                        const url = URL.createObjectURL(blob);

                        const a = document.createElement('a');
                        a.href = url;
                        const dataHoje = new Date().toISOString().split('T')[0];
                        a.download = `dados_${dataHoje}.csv`;
                        document.body.appendChild(a);
                        a.click();
                        document.body.removeChild(a);
                    }
                } catch (error) {
                    console.error("Erro ao descarregar dados:", error);
                } finally {
                    // Aguarda 1 segundo para o browser iniciar a transferência e depois fecha o separador
                    setTimeout(() => {
                        window.close();
                    }, 1000);
                }
            } catch (err) {
                console.error("Erro na inicialização:", err);
                setTimeout(() => {
                    window.close();
                }, 1000);
            }
        })();
    </script>
</body>

</html>
